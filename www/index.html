<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA CORE INJETOR</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; text-align: center; margin-top: 50px; }
        .btn { background: #00ff00; color: #000; padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; }
        .btn:active { background: #00cc00; }
        .log-area { margin-top: 30px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <div class="app">
        <h1>IA CORE V9</h1>
        <div class="status-card">
            <p>Status: <span id="status" style="color: #00ff00;">PRONTO</span></p>
        </div>
        
        <button id="btnInjetar" class="btn">INJETAR AGORA</button>
        
        <div id="log" class="log-area"></div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
